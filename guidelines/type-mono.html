<!-- @dsCard group="Type" viewport="700x170" name="Mono labels — Space Mono" subtitle="Eyebrows, tags, code — the exposed pipe" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg); color: var(--text); font-family: var(--font-mono); }
  .wrap { padding: 22px 24px; display: flex; flex-direction: column; gap: 14px; }
  .eyebrow { font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-muted); }
  .tags { display: flex; gap: 8px; }
  .tag { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; border: 1px solid var(--ink); padding: 4px 10px; }
  .code { font-size: 13px; background: var(--ink-slate); color: var(--paper); padding: 10px 12px; }
  .code .k { color: #C9A227; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="eyebrow">/ 01 — Dụng thần · resource-strong day master</div>
    <div class="tags"><span class="tag">Thổ</span><span class="tag">Hỏa</span><span class="tag">Thủy</span><span class="tag">Mộc</span><span class="tag">Kim</span></div>
    <div class="code"><span class="k">--primary</span>: #A0522D; <span class="k">/* Đinh Hỏa */</span></div>
  </div>
</body>
</html>
