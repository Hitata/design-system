<!-- @dsCard group="Colors" viewport="700x150" name="Base — Thổ (the room)" subtitle="Cement & earth: background, surface, structure" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg); font-family: var(--font-mono); }
  .row { display: flex; gap: 0; padding: 20px; }
  .sw { flex: 1; border: var(--border-hair) solid var(--ink); border-left: none; }
  .sw:first-child { border-left: var(--border-hair) solid var(--ink); }
  .chip { height: 64px; }
  .meta { padding: 8px 10px; border-top: var(--border-hair) solid var(--ink); }
  .name { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text); }
  .hex { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#E8E4DD"></div><div class="meta"><div class="name">Paper</div><div class="hex">#E8E4DD</div></div></div>
    <div class="sw"><div class="chip" style="background:#B8A992"></div><div class="meta"><div class="name">Plaster</div><div class="hex">#B8A992</div></div></div>
    <div class="sw"><div class="chip" style="background:#8C8A85"></div><div class="meta"><div class="name">Cement</div><div class="hex">#8C8A85</div></div></div>
    <div class="sw"><div class="chip" style="background:#6B6862"></div><div class="meta"><div class="name">Text-grey</div><div class="hex">#6B6862</div></div></div>
    <div class="sw"><div class="chip" style="background:#1F1F1F"></div><div class="meta"><div class="name">Ink</div><div class="hex">#1F1F1F</div></div></div>
  </div>
</body>
</html>
