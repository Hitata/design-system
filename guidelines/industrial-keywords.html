<!-- @dsCard group="Brand" viewport="700x230" name="Industrial keywords" subtitle="The register to design toward — and the finishes to avoid" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg); color: var(--text); font-family: var(--font-mono); }
  .wrap { padding: 22px 24px; }
  .h { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.14em; color: var(--text-muted); margin-bottom: 12px; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 22px; }
  .chip { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; border: 1px solid var(--ink); padding: 5px 11px; background: var(--surface-warm); }
  .avoid .chip { border-color: var(--cement-text); color: var(--text-muted); text-decoration: line-through; background: transparent; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="h">Design toward — raw, honest, exposed</div>
    <div class="chips">
      <span class="chip">Exposed brick</span><span class="chip">Raw concrete</span><span class="chip">Iron &amp; steel</span>
      <span class="chip">Visible ductwork</span><span class="chip">Riveted metal</span><span class="chip">Reclaimed wood</span>
      <span class="chip">Edison glow</span><span class="chip">Wire &amp; mesh</span><span class="chip">Worn leather</span><span class="chip">Open plan</span>
    </div>
    <div class="h avoid-h">Avoid — anything polished or precious</div>
    <div class="chips avoid">
      <span class="chip">Soft pastels</span><span class="chip">Ornate patterns</span><span class="chip">Polished finishes</span><span class="chip">Candy accents</span>
    </div>
  </div>
</body>
</html>
