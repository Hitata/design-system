<!-- @dsCard group="Type" viewport="700x210" name="Editorial — Newsreader" subtitle="Humanist serif for long-read moments" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg); color: var(--text); }
  .wrap { padding: 22px 24px; max-width: 620px; }
  .ey { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-muted); }
  .lead { font-family: var(--font-serif); font-size: 20px; line-height: var(--leading-relaxed); margin: 10px 0 0; }
  .lead em { color: var(--primary); font-style: italic; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="ey">Newsreader · 400 / italic</div>
    <p class="lead">The cement is the room; the chart is the light on it. Ink before ember — text carries the weight, and the <em>ember is for what you want the eye to act on.</em></p>
  </div>
</body>
</html>
