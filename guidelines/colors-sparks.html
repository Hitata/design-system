<!-- @dsCard group="Colors" viewport="700x150" name="Sparks (the light)" subtitle="Ngũ hành accents: ember leads, the rest speak only on meaning" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg); font-family: var(--font-mono); }
  .row { display: flex; gap: 0; padding: 20px; }
  .sw { flex: 1; border: var(--border-hair) solid var(--ink); border-left: none; }
  .sw:first-child { border-left: var(--border-hair) solid var(--ink); }
  .chip { height: 64px; }
  .meta { padding: 8px 10px; border-top: var(--border-hair) solid var(--ink); }
  .name { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text); }
  .el { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
  .hex { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#A0522D"></div><div class="meta"><div class="name">Ember</div><div class="el">Hỏa · Đinh</div><div class="hex">#A0522D</div></div></div>
    <div class="sw"><div class="chip" style="background:#8F4527"></div><div class="meta"><div class="name">Ember deep</div><div class="el">Hỏa · hover</div><div class="hex">#8F4527</div></div></div>
    <div class="sw"><div class="chip" style="background:#28323B"></div><div class="meta"><div class="name">Ink slate</div><div class="el">Thủy · Phá Quân</div><div class="hex">#28323B</div></div></div>
    <div class="sw"><div class="chip" style="background:#6B7A5A"></div><div class="meta"><div class="name">Moss</div><div class="el">Mộc · success</div><div class="hex">#6B7A5A</div></div></div>
    <div class="sw"><div class="chip" style="background:#9A8557"></div><div class="meta"><div class="name">Brass</div><div class="el">Kim · rare</div><div class="hex">#9A8557</div></div></div>
  </div>
</body>
</html>
