<!-- @dsCard group="Colors" viewport="700x180" name="Industrial material map" subtitle="The ngũ hành tones renamed for the warehouse register" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg); font-family: var(--font-mono); }
  .row { display: flex; gap: 0; padding: 20px; }
  .sw { flex: 1; border: 1px solid var(--ink); border-left: none; }
  .sw:first-child { border-left: 1px solid var(--ink); }
  .chip { height: 58px; }
  .meta { padding: 8px 10px; border-top: 1px solid var(--ink); }
  .name { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text); }
  .el { font-size: 9.5px; color: var(--text-muted); margin-top: 3px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--mat-brick)"></div><div class="meta"><div class="name">Exposed brick</div><div class="el">--mat-brick · Hỏa</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--mat-concrete)"></div><div class="meta"><div class="name">Raw concrete</div><div class="el">--mat-concrete · Thổ</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--mat-iron)"></div><div class="meta"><div class="name">Iron black</div><div class="el">--mat-iron · Thủy</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--mat-wood)"></div><div class="meta"><div class="name">Weathered wood</div><div class="el">--mat-wood · Thổ</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--mat-teal)"></div><div class="meta"><div class="name">Deep teal</div><div class="el">--mat-teal · Thủy</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--mat-copper)"></div><div class="meta"><div class="name">Aged copper</div><div class="el">--mat-copper · Kim</div></div></div>
  </div>
</body>
</html>
