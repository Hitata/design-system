<!-- @dsCard group="Type" viewport="700x300" name="Type scale" subtitle="1.250 major third, 16px base" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg); color: var(--text); }
  .wrap { padding: 18px 24px; }
  .line { display: flex; align-items: baseline; gap: 16px; border-bottom: 1px solid color-mix(in srgb, var(--ink) 18%, transparent); padding: 6px 0; }
  .tok { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); width: 96px; flex: none; }
  .spec { font-family: var(--font-display); font-weight: 800; line-height: 1; letter-spacing: -0.02em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="line"><span class="tok">--text-4xl 61</span><span class="spec" style="font-size:42px">Roadside earth</span></div>
    <div class="line"><span class="tok">--text-2xl 39</span><span class="spec" style="font-size:31px">Section title</span></div>
    <div class="line"><span class="tok">--text-xl 31</span><span class="spec" style="font-size:25px">Heading level</span></div>
    <div class="line"><span class="tok">--text-md 20</span><span class="spec" style="font-size:20px; font-weight:600">Lead paragraph</span></div>
    <div class="line"><span class="tok">--text-base 16</span><span class="spec" style="font-size:16px; font-weight:500; font-family:var(--font-sans)">Body copy — Be Vietnam Pro</span></div>
    <div class="line"><span class="tok">--text-sm 14</span><span class="spec" style="font-size:14px; font-family:var(--font-mono); font-weight:400; letter-spacing:0">Meta / mono caption</span></div>
  </div>
</body>
</html>
