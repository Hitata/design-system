<!-- @dsCard group="Brand" viewport="700x200" name="Wordmark" subtitle="Typographic lockup — Be Vietnam Pro black + mono tagline" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg); color: var(--text); }
  .wrap { padding: 30px 28px; }
  .mark { display: flex; align-items: center; gap: 14px; }
  .seal { width: 18px; height: 36px; background: var(--ember); border: 1px solid var(--ink); }
  .word { font-family: var(--font-display); font-weight: 900; font-size: 44px; letter-spacing: -0.02em; line-height: 1; }
  .word .o { color: var(--ember); }
  .tag { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-muted); margin-top: 14px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="mark">
      <div class="seal"></div>
      <div class="word">ĐINH H<span class="o">Ỏ</span>A</div>
    </div>
    <div class="tag">Lộ Bàng Thổ — roadside earth · ngũ hành color system</div>
  </div>
</body>
</html>
