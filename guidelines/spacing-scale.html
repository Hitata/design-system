<!-- @dsCard group="Spacing" viewport="700x170" name="Spacing scale" subtitle="4px base — the exposed-pipe grid" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg); color: var(--text); font-family: var(--font-mono); }
  .wrap { padding: 22px 24px; display: flex; gap: 18px; align-items: flex-end; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .bar { background: var(--ember); border: 1px solid var(--ink); width: 22px; }
  .t { font-size: 10px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="col"><div class="bar" style="height:8px"></div><div class="t">2 · 8</div></div>
    <div class="col"><div class="bar" style="height:12px"></div><div class="t">3 · 12</div></div>
    <div class="col"><div class="bar" style="height:16px"></div><div class="t">4 · 16</div></div>
    <div class="col"><div class="bar" style="height:24px"></div><div class="t">5 · 24</div></div>
    <div class="col"><div class="bar" style="height:32px"></div><div class="t">6 · 32</div></div>
    <div class="col"><div class="bar" style="height:48px"></div><div class="t">8 · 48</div></div>
    <div class="col"><div class="bar" style="height:64px"></div><div class="t">10 · 64</div></div>
    <div class="col"><div class="bar" style="height:96px"></div><div class="t">12 · 96</div></div>
  </div>
</body>
</html>
