<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Đinh Hỏa — brutalist editorial site</title>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  html, body { margin: 0; }
  body { background: var(--bg); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="SiteHeader.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="ElementGrid.jsx"></script>
<script type="text/babel" src="Editorial.jsx"></script>
<script type="text/babel" src="CTASection.jsx"></script>
<script type="text/babel">
  function App() {
    const [dark, setDark] = React.useState(false);
    React.useEffect(() => {
      document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
    }, [dark]);
    return (
      <React.Fragment>
        <SiteHeader dark={dark} onToggle={setDark} />
        <Hero />
        <ElementGrid />
        <Editorial />
        <CTASection />
        <SiteFooter />
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
